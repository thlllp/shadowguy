name: Tests

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.14"
      - name: Install dependencies
        run: uv sync
      - name: Ruff
        run: uvx ruff check src/
      - name: Pytest
        run: uv run pytest -q
